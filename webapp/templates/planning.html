<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Планирование — SK-Reporter</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="/static/app.css?v={{ git_head }}"/>
</head>
<body>
<header>
  <a class="header-link" href="/">← SK-Reporter</a>
  <span class="title">Планирование</span>
</header>

<div class="planning-shell">
  <nav class="planning-tabs" role="tablist">
    <button type="button" class="planning-tab is-active" data-tab="projects" role="tab">Проекты</button>
    <button type="button" class="planning-tab" data-tab="personnel" role="tab">Сотрудники</button>
    <button type="button" class="planning-tab" data-tab="otkk" role="tab">ОТКК</button>
  </nav>

  <div class="planning-panel" id="panel-projects" role="tabpanel">
    <p class="planning-hint">Каталоги в <code>data/projects/</code> — ВОР, project.yaml, vor.json.</p>
    <div id="projectsList" class="planning-cards"></div>
  </div>

  <div class="planning-panel" id="panel-personnel" role="tabpanel" hidden>
    <p class="planning-hint">Файлы в <code>data/personnel/</code> — справочник; кэш <code>personnel.yaml</code>.</p>
    <div id="personnelList"></div>
  </div>

  <div class="planning-panel" id="panel-otkk" role="tabpanel" hidden>
    <p class="planning-hint">Технологические карты в <code>data/tk/</code> — manifest.yaml.</p>
    <div id="otkkList"></div>
  </div>
</div>

<script src="/static/planning.js?v={{ git_head }}"></script>
</body>
</html>
