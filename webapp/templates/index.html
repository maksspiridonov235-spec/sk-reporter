<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Объединение отчётов СК</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; color: #222; }
    header { background: #1a56a0; color: #fff; padding: 16px 24px; font-size: 18px; font-weight: bold; }

    .layout { display: flex; gap: 0; height: calc(100vh - 54px); }

    /* Левая панель */
    .sidebar { width: 300px; min-width: 260px; background: #fff; border-right: 1px solid #ddd;
               display: flex; flex-direction: column; padding: 16px; gap: 12px; overflow-y: auto; }

    .section-title { font-size: 12px; font-weight: bold; text-transform: uppercase;
                     color: #888; letter-spacing: .5px; margin-bottom: 4px; }

    .upload-zone { border: 2px dashed #aac4e8; border-radius: 8px; padding: 14px;
                   text-align: center; cursor: pointer; background: #f5f9ff;
                   transition: border-color .2s; }
    .upload-zone:hover { border-color: #1a56a0; }
    .upload-zone input { display: none; }
    .upload-zone span { font-size: 13px; color: #555; }

    .file-list { font-size: 12px; color: #444; max-height: 120px; overflow-y: auto;
                 border: 1px solid #e0e0e0; border-radius: 6px; padding: 6px; background: #fafafa; }
    .file-list div { padding: 2px 0; border-bottom: 1px solid #f0f0f0; }
    .file-list div:last-child { border-bottom: none; }

    /* Кнопки действий */
    .btn { width: 100%; padding: 9px 12px; border: none; border-radius: 6px; cursor: pointer;
           font-size: 13px; font-weight: bold; transition: background .15s; }
    .btn-blue   { background: #1a56a0; color: #fff; }
    .btn-blue:hover   { background: #154480; }
    .btn-green  { background: #1e8c45; color: #fff; }
    .btn-green:hover  { background: #166835; }
    .btn-orange { background: #d97706; color: #fff; }
    .btn-orange:hover { background: #b45309; }
    .btn-red    { background: #dc2626; color: #fff; }
    .btn-red:hover    { background: #b91c1c; }
    .btn-gray   { background: #6b7280; color: #fff; }
    .btn-gray:hover   { background: #4b5563; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .divider { border: none; border-top: 1px solid #e5e7eb; margin: 4px 0; }

    /* Центральная область */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }


    /* Результаты */
    .results-panel { padding: 0 16px 16px; flex: 1; overflow-y: auto; }
    .results-title { font-size: 13px; font-weight: bold; color: #444; margin-bottom: 8px; }
    .result-item { display: flex; align-items: center; justify-content: space-between;
                   background: #fff; border: 1px solid #d1fae5; border-radius: 6px;
                   padding: 8px 12px; margin-bottom: 6px; font-size: 13px; }
    .result-item a { color: #1a56a0; font-weight: bold; text-decoration: none; }
    .result-item a:hover { text-decoration: underline; }

    /* Лог */
    .log-wrap { border-top: 2px solid #333; flex-shrink: 0; }
    .log-resizer { height: 6px; background: #2d2d2d; cursor: ns-resize; display: flex;
                   align-items: center; justify-content: center; }
    .log-resizer::after { content: ''; width: 40px; height: 2px; background: #555; border-radius: 2px; }
    .log-header { display: flex; align-items: center; justify-content: space-between;
                  background: #2d2d2d; padding: 4px 14px; user-select: none; }
    .log-header span { color: #888; font-size: 11px; font-family: monospace; }
    .log-header .log-clear { font-size: 11px; color: #6b7280; cursor: pointer; background: none;
                              border: none; padding: 2px 6px; border-radius: 3px; }
    .log-header .log-clear:hover { color: #fff; background: #444; }
    .log-panel { height: 200px; min-height: 60px; background: #1e1e1e;
                 color: #d4d4d4; font-family: monospace; font-size: 12px;
                 overflow-y: auto; padding: 10px 14px; }
    .log-panel .ok  { color: #6ee7b7; }
    .log-panel .err { color: #fca5a5; }
    .log-panel .info{ color: #93c5fd; }

    /* Карточка pipeline */
    .parsed-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
                   padding: 12px 14px; margin-bottom: 10px; font-size: 12px; }
    .parsed-card h4 { font-size: 13px; color: #1a56a0; margin-bottom: 8px; font-weight: bold;
                      display: flex; align-items: center; gap: 8px; }
    .parsed-card table { width: 100%; border-collapse: collapse; }
    .parsed-card td { padding: 3px 6px; vertical-align: top; }
    .parsed-card td:first-child { color: #666; width: 120px; white-space: nowrap; font-weight: bold; }
    .parsed-card td:last-child { color: #222; }
    .parsed-card .parse-err { color: #dc2626; font-style: italic; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
    .badge-ok   { background: #d1fae5; color: #065f46; }
    .badge-fail { background: #fee2e2; color: #991b1b; }
    .score-bar { height: 4px; background: #e5e7eb; border-radius: 2px; margin: 6px 0 8px; }
    .score-fill { height: 4px; border-radius: 2px; background: #1a56a0; }
    .warnings-list { margin: 6px 0 0; padding-left: 14px; color: #b45309; }
    .pipeline-summary { background: #1a56a0; color: #fff; border-radius: 8px; padding: 10px 14px;
                        margin-bottom: 12px; font-size: 13px; display: flex; gap: 20px; align-items: center; }
    .pipeline-summary span { opacity: .85; }
    .pipeline-summary strong { font-size: 16px; }

    /* Спиннер */
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff;
               border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite;
               vertical-align: middle; margin-left: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Вкладки */
    .tabs { display: flex; gap: 0; border-bottom: 2px solid #e0e0e0; background: #fafafa; }
    .tab-btn { padding: 10px 16px; background: none; border: none; cursor: pointer;
               font-size: 13px; color: #666; font-weight: bold; border-bottom: 2px solid transparent;
               transition: color .2s; }
    .tab-btn:hover { color: #1a56a0; }
    .tab-btn.active { color: #1a56a0; border-bottom-color: #1a56a0; }

    /* Контент вкладок */
    .tab-content { display: none; flex: 1; overflow-y: auto; }
    .tab-content.active { display: flex; flex-direction: column; }

    /* Результаты проверки */
    .check-results { padding: 16px; }
    .check-report { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px;
                    padding: 14px; margin-bottom: 12px; }
    .check-report h3 { font-size: 13px; color: #1a56a0; margin-bottom: 10px; font-weight: bold; }
    .check-report-content { font-size: 12px; line-height: 1.6; color: #333; white-space: pre-wrap; font-family: 'Courier New', monospace; }
    .check-report.ok { border-left: 4px solid #1e8c45; }
    .check-report.error { border-left: 4px solid #dc2626; }
  </style>
</head>
<body>

<header style="display:flex;align-items:center;justify-content:space-between">
  <span>Объединение отчётов СК</span>
    AI Агенты →
  </a>
</header>

<div class="layout">

  <!-- Левая панель -->
  <div class="sidebar">

    <div>
      <div class="section-title">1. Отчёты от инженеров</div>
      <div class="upload-zone" onclick="document.getElementById('inp-reports').click()">
        <input type="file" id="inp-reports" multiple accept=".docx,.doc" onchange="uploadReports(this)"/>
        <span>Перетащите или нажмите<br>для загрузки .docx/.doc</span>
      </div>
      <div id="list-reports" class="file-list" style="margin-top:6px">Нет файлов</div>
    </div>

    <hr class="divider"/>

    <div>
      <div class="section-title">Проверка отчётов</div>
      <button class="btn btn-blue" onclick="checkDescriptions()">Проверка описания действий</button>
    </div>

    <hr class="divider"/>

    <div>
      <div class="section-title">Макросы (к отчётам, до сборки)</div>
      <button class="btn btn-blue" style="margin-bottom:6px"
              onclick="runMacro('HighlightSecondRow_No5991')">Выделить 2-ю строку таблиц</button>
      <button class="btn btn-blue" style="margin-bottom:6px"
              onclick="runMacro('NewMacros')">Форматировать документ</button>
      <button class="btn btn-orange" style="margin-bottom:6px"
              onclick="runMacro('ReplaceDateInReportLine')">Поставить сегодняшнюю дату</button>
      <button class="btn btn-orange"
              onclick="runMacro('ReplaceDateInReportLine2')">Поставить вчерашнюю дату</button>
    </div>

    <hr class="divider"/>

    <div>
      <div class="section-title">Переименовать файлы шаблонов</div>
      <button class="btn btn-orange" style="margin-bottom:6px"
              onclick="renameFiles('today')">Дата → сегодня</button>
      <button class="btn btn-orange"
              onclick="renameFiles('yesterday')">Дата → вчера</button>
    </div>

    <hr class="divider"/>

    <button class="btn btn-green" onclick="mergeAll()">Сформировать все отчёты</button>

    <div id="rename-results-buttons" style="display: none; margin-top: 12px;">
      <div class="section-title">Переименовать результаты</div>
      <button class="btn btn-orange" style="margin-bottom: 6px; font-size: 12px;"
              onclick="renameResults('today')">Результаты → сегодня</button>
      <button class="btn btn-orange" style="font-size: 12px;"
              onclick="renameResults('yesterday')">Результаты → вчера</button>
    </div>

    

    <hr class="divider"/>

    <button class="btn btn-gray" onclick="downloadAll()">Забрать всё (ZIP)</button>

    <hr class="divider"/>

    <button class="btn btn-red" onclick="resetAll()">Сбросить всё и начать заново</button>

  </div>

  <!-- Основная область -->
  <div class="main">

    <!-- Вкладки -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('results')">Готовые файлы</button>
      
      <button class="tab-btn" onclick="switchTab('check')">Результаты проверки</button>
    </div>

    <!-- Вкладка "Готовые файлы" -->
    <div class="tab-content active" id="tab-results">
      <div class="results-panel">
        <div class="results-title">Готовые файлы</div>
        <div id="results-list"></div>
      </div>
    </div>

    <!-- Вкладка "Результаты проверки" -->
    <div class="tab-content" id="tab-check">
      <div class="check-results">
        <div class="results-title">Результаты проверки отчётов</div>
        <div id="check-list"></div>
      </div>
    </div>

    <!-- Лог -->
    <div class="log-wrap">
      <div class="log-resizer" id="log-resizer"></div>
      <div class="log-header">
        <span>Журнал операций</span>
        <button class="log-clear" onclick="document.getElementById('log').innerHTML=''">очистить</button>
      </div>
      <div class="log-panel" id="log"></div>
    </div>

  </div>
</div>

<script>
  // ── Утилиты ──────────────────────────────────────────────────────────────

  function logLine(msg, type = "info") {
    const el = document.getElementById("log");
    const line = document.createElement("div");
    line.className = type;
    line.textContent = new Date().toLocaleTimeString() + "  " + msg;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  async function apiFetch(url, options = {}) {
    try {
      const res = await fetch(url, options);
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || res.statusText);
      return data;
    } catch (e) {
      logLine("Ошибка: " + e.message, "err");
      throw e;
    }
  }

  // ── Загрузка файлов ───────────────────────────────────────────────────────

  async function uploadReports(input) {
    const fd = new FormData();
    for (const f of input.files) fd.append("files", f);
    logLine(`Загружаю ${input.files.length} отчётов...`);
    const data = await apiFetch("/upload/reports", { method: "POST", body: fd });
    logLine(`Загружено: ${data.count} файлов`, "ok");
    logLine("Готово.", "ok");
    refreshReportsList();
  }

  async function refreshReportsList() {
    const data = await apiFetch("/files/reports");
    const el = document.getElementById("list-reports");
    el.innerHTML = data.files.length
      ? data.files.map(f => `<div>${f}</div>`).join("")
      : "Нет файлов";
  }

  async function refreshTemplatesList() {
    const data = await apiFetch("/files/templates");
    const el = document.getElementById("list-templates");
    el.innerHTML = data.files.length
      ? data.files.map(f => `<div>${f}</div>`).join("")
      : "Нет файлов";
  }

  // ── Проверка описаний ──────────────────────────────────────────────────────

  // ── Переключение вкладок ──────────────────────────────────────────────────
  function switchTab(tabName) {
    // Скрываем все вкладки
    document.querySelectorAll(".tab-content").forEach(tab => tab.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));

    // Показываем выбранную вкладку
    document.getElementById(`tab-${tabName}`).classList.add("active");
    event.target.classList.add("active");
  }

  async function checkDescriptions() {
    logLine("Проверка описания действий в отчётах...", "info");
    const checkList = document.getElementById("check-list");
    checkList.innerHTML = ""; // Очищаем предыдущие результаты

    try {
      const response = await fetch("/check/descriptions/stream", { method: "POST" });
      if (!response.ok) throw new Error(response.statusText);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          try {
            const data = JSON.parse(line.slice(6));

            if (data.type === "start") {
              logLine(data.msg, "info");
            } else if (data.type === "report") {
              logLine(data.filename, "info");
              logLine(data.msg, data.hasErrors ? "err" : "ok");

              // Добавляем в вкладку "Результаты проверки"
              if (data.result && data.result.report) {
                const reportEl = document.createElement("div");
                reportEl.className = `check-report ${data.hasErrors ? "error" : "ok"}`;
                reportEl.innerHTML = `
                  <h3>${data.filename}</h3>
                  <div class="check-report-content">${data.result.report}</div>
                `;
                checkList.appendChild(reportEl);
              }
            } else if (data.type === "error") {
              logLine(data.msg, "err");
            } else if (data.type === "done") {
              logLine("Проверка завершена.", "ok");
              // Автоматически переходим на вкладку результатов
              switchTab("check");
              if (data.summary) {
                logLine(`Всего отчётов проверено: ${data.summary.total}`, "info");
                logLine(`С ошибками: ${data.summary.errors}`, data.summary.errors > 0 ? "err" : "ok");
              }
            }
          } catch (e) {
            console.error("Parse error:", e);
          }
        }
      }
    } catch (e) {
      logLine(`Ошибка: ${e.message}`, "err");
    }
  }

  // ── Макросы ───────────────────────────────────────────────────────────────

  async function runMacro(name) {
    const names = {
      "HighlightSecondRow_No5991": "Выделение 2-й строки таблиц",
      "NewMacros": "Форматирование документа",
      "ReplaceDateInReportLine": "Замена даты на сегодняшнюю",
      "ReplaceDateInReportLine2": "Замена даты на вчерашнюю",
    };
    logLine(`Запускаю макрос: ${names[name] || name}...`);
    const data = await apiFetch(`/macro/${name}`, { method: "POST" });
    data.log.forEach(line => logLine(line, line.startsWith("[ERR]") ? "err" : "ok"));
    logLine("Готово.", "ok");
  }

  // ── Переименование ────────────────────────────────────────────────────────

  async function renameFiles(mode) {
    logLine(`Обновление даты в шаблонах (дата → ${mode === "today" ? "сегодня" : "вчера"})...`);
    const data = await apiFetch(`/rename/templates/${mode}`, { method: "POST" });
    data.log.forEach(line => logLine(line, line.startsWith("Ошибка") ? "err" : "ok"));
    if (data.log.length === 0) logLine("Нет шаблонов для переименования.", "info");
    logLine("Готово.", "ok");
  }

  async function renameResults(mode) {
    logLine(`Переименование результатов (дата → ${mode === "today" ? "сегодня" : "вчера"})...`);
    const data = await apiFetch(`/rename/results/${mode}`, { method: "POST" });
    data.log.forEach(line => logLine(line, line.startsWith("Ошибка") ? "err" : "ok"));
    if (data.log.length === 0) logLine("Нет файлов для переименования.", "info");
    logLine("Готово.", "ok");
    refreshResults();
  }

  // ── Объединение ───────────────────────────────────────────────────────────

  async function mergeAll() {
    logLine("Формирую все отчёты...");

    try {
      const response = await fetch("/merge/all/stream");
      if (!response.ok) throw new Error(response.statusText);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n\n");
        buffer = lines.pop(); // Сохраняем неполный формат SSE

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          try {
            const data = JSON.parse(line.slice(6));

            if (data.type === "start") {
              logLine(data.msg, "info");
            } else if (data.type === "info") {
              logLine(data.msg, "info");
            } else if (data.type === "success") {
              logLine(data.msg, "ok");
            } else if (data.type === "warning") {
              logLine(data.msg, "err");
            } else if (data.type === "error") {
              logLine(data.msg, "err");
            } else if (data.type === "done") {
              // Финальные результаты
              if (data.results.length === 0 && data.errors.length === 0) {
                logLine("Отчёты и шаблоны не найдены. Проверьте загруженные файлы.", "err");
              }
              if (data.unmatched && data.unmatched.length > 0) {
                logLine(`Без болванки — скопированы как есть (${data.unmatched.length}):`, "info");
                data.unmatched.forEach(f => logLine(`  → ${f.file} (${f.company})`, "info"));
              }
              if (data.unmatched_unknown && data.unmatched_unknown.length > 0) {
                logLine(`Компания не определена — скопированы как есть (${data.unmatched_unknown.length}):`, "err");
                data.unmatched_unknown.forEach(f => logLine(`  → ${f}`, "err"));
              }

              const summary = `Завершено. Собрано: ${data.results.length}, без болванки: ${(data.unmatched||[]).length}, не распознано: ${(data.unmatched_unknown||[]).length}`;
              logLine(summary, (data.unmatched_unknown||[]).length ? "err" : "ok");
              logLine("Готово.", "ok");

              // Показываем кнопки для переименования результатов
              console.log("data.results:", data.results, "length:", data.results?.length);
              if (data.results && data.results.length > 0) {
                const btn = document.getElementById("rename-results-buttons");
                console.log("Found button:", btn);
                if (btn) {
                  btn.style.display = "block";
                  console.log("Buttons shown");
                }
              }
            }
          } catch (e) {
            console.error("Parse error:", e);
          }
        }
      }
    } catch (e) {
      logLine(`Ошибка: ${e.message}`, "err");
    }

    refreshResults();
  }

  // ── Результаты ────────────────────────────────────────────────────────────

  async function refreshResults() {
    const data = await apiFetch("/results");
    const el = document.getElementById("results-list");
    el.innerHTML = data.files.length
      ? data.files.map(f =>
          `<div class="result-item">
             <span>${f}</span>
             <a href="/download/${encodeURIComponent(f)}" download>Скачать</a>
           </div>`
        ).join("")
      : "<div style='color:#888;font-size:13px'>Нет готовых файлов</div>";
  }

  // ── Скачать всё ZIP ───────────────────────────────────────────────────────

  async function downloadAll() {
    logLine("Подготавливаю архив со всеми файлами...");
    const a = document.createElement("a");
    a.href = "/download/all.zip";
    a.download = "отчёты.zip";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    logLine("Загрузка архива началась.", "ok");
  }

  // ── Очистка ───────────────────────────────────────────────────────────────

  async function resetAll() {
    if (!confirm("Сбросить всё? Удалятся отчёты и результаты.")) return;
    await apiFetch("/clear/all", { method: "DELETE" });
    document.getElementById("log").innerHTML = "";
    logLine("Все файлы удалены. Можно начинать заново.", "ok");
    refreshReportsList();
    refreshResults();
  }

  // ── Drag & Drop ───────────────────────────────────────────────────────────

  function setupDrop(zoneId, inputId) {
    const zone = document.querySelector(`#${inputId}`).closest(".upload-zone");
    zone.addEventListener("dragover", e => { e.preventDefault(); zone.style.borderColor = "#1a56a0"; });
    zone.addEventListener("dragleave", () => { zone.style.borderColor = "#aac4e8"; });
    zone.addEventListener("drop", e => {
      e.preventDefault();
      zone.style.borderColor = "#aac4e8";
      const input = document.getElementById(inputId);
      const dt = new DataTransfer();
      for (const f of e.dataTransfer.files) dt.items.add(f);
      input.files = dt.files;
      input.dispatchEvent(new Event("change"));
    });
  }

  setupDrop("zone-reports", "inp-reports");

  // ── Растягивание лога ─────────────────────────────────────────────────────
  (function() {
    const resizer = document.getElementById("log-resizer");
    const logPanel = document.getElementById("log");
    let startY = 0, startH = 0;

    resizer.addEventListener("mousedown", e => {
      startY = e.clientY;
      startH = logPanel.offsetHeight;
      document.body.style.cursor = "ns-resize";
      document.body.style.userSelect = "none";

      function onMove(e) {
        const delta = startY - e.clientY;
        const newH = Math.max(60, startH + delta);
        logPanel.style.height = newH + "px";
      }
      function onUp() {
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  })();

  // Загружаем списки при старте
  refreshReportsList();
  refreshResults();
</script>
</body>
</html>
