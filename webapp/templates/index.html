<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Отчёты СК</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; color: #222; }
    header {
      background: #1a56a0; color: #fff; padding: 16px 24px;
      display: flex; align-items: center; gap: 16px;
    }
    header .title { font-size: 18px; font-weight: bold; }

    .layout { display: flex; gap: 0; height: calc(100vh - 54px); }

    /* Левая панель */
    .sidebar {
      width: 300px; min-width: 260px; background: #fff; border-right: 1px solid #ddd;
      display: flex; flex-direction: column; padding: 16px; gap: 10px; overflow-y: auto;
    }
    .section-title {
      font-size: 11px; font-weight: bold; text-transform: uppercase;
      color: #888; letter-spacing: .5px; margin-bottom: 2px;
    }
    .upload-zone {
      border: 2px dashed #aac4e8; border-radius: 8px; padding: 12px;
      text-align: center; cursor: pointer; background: #f5f9ff;
      transition: border-color .2s;
    }
    .upload-zone:hover { border-color: #1a56a0; }
    .upload-zone input { display: none; }
    .upload-zone span { font-size: 13px; color: #555; }

    .file-list {
      font-size: 12px; color: #444; max-height: 100px; overflow-y: auto;
      border: 1px solid #e0e0e0; border-radius: 6px; padding: 6px; background: #fafafa;
    }
    .file-list div { padding: 2px 0; border-bottom: 1px solid #f0f0f0; }
    .file-list div:last-child { border-bottom: none; }
    .file-count { font-size: 12px; color: #888; }

    .btn {
      width: 100%; padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-weight: bold; transition: background .15s;
    }
    .btn-blue   { background: #1a56a0; color: #fff; }
    .btn-blue:hover   { background: #154480; }
    .btn-green  { background: #1e8c45; color: #fff; }
    .btn-green:hover  { background: #166835; }
    .btn-orange { background: #d97706; color: #fff; }
    .btn-orange:hover { background: #b45309; }
    .btn-red    { background: #dc2626; color: #fff; }
    .btn-red:hover    { background: #b91c1c; }
    .btn-gray   { background: #6b7280; color: #fff; }
    .btn-gray:hover   { background: #4b5563; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-row { display: flex; gap: 6px; }
    .btn-row .btn { width: 50%; }

    .divider { border: none; border-top: 1px solid #e5e7eb; margin: 2px 0; }

    /* Центральная область */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Прогресс */
    .progress-bar-wrap { height: 3px; background: #e5e7eb; overflow: hidden; flex-shrink: 0; }
    .progress-bar { height: 3px; background: #1a56a0; width: 0%; transition: width .3s; }

    /* Центральная панель активности */
    .activity-panel {
      flex: 1; overflow-y: auto; padding: 20px 24px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* Живая строка статуса */
    .live-status {
      display: flex; align-items: center; gap: 10px;
      background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px;
      padding: 10px 14px; font-size: 13px; color: #1e40af;
    }
    .live-status.hidden { display: none; }
    .live-status.done   { background: #f0fdf4; border-color: #86efac; color: #166534; }
    .live-status.error  { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
    .live-status-text   { flex: 1; }

    /* Карточка итогов */
    .summary-card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
      padding: 16px 20px; display: flex; flex-direction: column; gap: 10px;
    }
    .summary-card-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .summary-card-title {
      font-size: 14px; font-weight: bold; color: #111;
    }
    .summary-card-meta {
      font-size: 12px; color: #6b7280;
    }
    .summary-stats {
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .stat-chip {
      font-size: 12px; font-weight: bold; padding: 4px 10px;
      border-radius: 20px; white-space: nowrap;
    }
    .stat-blue   { background: #dbeafe; color: #1e40af; }
    .stat-green  { background: #d1fae5; color: #065f46; }
    .stat-amber  { background: #fef3c7; color: #92400e; }
    .stat-red    { background: #fee2e2; color: #991b1b; }

    /* Детали операции (свернуты по умолчанию) */
    .detail-toggle {
      font-size: 12px; color: #1a56a0; cursor: pointer;
      background: none; border: none; padding: 0;
      text-decoration: underline;
    }
    .detail-block {
      display: none; font-size: 12px; color: #374151;
      background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 6px; padding: 10px 12px;
      max-height: 260px; overflow-y: auto;
    }
    .detail-block.open { display: block; }
    .detail-row {
      display: flex; align-items: baseline; gap: 6px;
      padding: 3px 0; border-bottom: 1px solid #f3f4f6;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-icon { width: 16px; text-align: center; flex-shrink: 0; }
    .detail-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .detail-badge {
      font-size: 11px; padding: 1px 7px; border-radius: 10px; flex-shrink: 0;
    }
    .db-ok  { background: #d1fae5; color: #065f46; }
    .db-warn { background: #fef3c7; color: #92400e; }
    .db-err  { background: #fee2e2; color: #991b1b; }

    /* Карточка файла (проверка) */
    .file-card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 12px 14px;
    }
    .file-card-head {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .file-card-name { font-size: 13px; font-weight: bold; flex: 1; }
    .badge {
      font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 12px;
    }
    .badge-ok  { background: #d1fae5; color: #065f46; }
    .badge-err { background: #fee2e2; color: #991b1b; }
    .file-card-actions {
      display: flex; align-items: center; gap: 8px; margin-top: 8px;
    }
    .file-card-actions a {
      font-size: 12px; font-weight: bold; color: #1a56a0; text-decoration: none;
      padding: 3px 10px; border: 1px solid #1a56a0; border-radius: 4px;
    }
    .file-card-actions a:hover { background: #1a56a0; color: #fff; }
    .report-body {
      display: none; font-size: 12px; color: #444;
      background: #f9fafb; border-radius: 4px; padding: 8px;
      white-space: pre-wrap; font-family: monospace; margin-top: 8px;
      max-height: 240px; overflow-y: auto;
      border: 1px solid #e5e7eb;
    }

    /* Пустое состояние */
    .empty-hint {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #9ca3af; font-size: 14px; gap: 6px;
    }
    .empty-hint-icon { font-size: 32px; }

    /* Правая панель */
    .results-panel {
      width: 280px; min-width: 220px; background: #fff; border-left: 1px solid #ddd;
      display: flex; flex-direction: column; padding: 16px; gap: 8px; overflow-y: auto;
    }
    .results-title {
      font-size: 11px; font-weight: bold; text-transform: uppercase;
      color: #888; letter-spacing: .5px; margin-bottom: 4px;
    }
    .result-item {
      display: flex; align-items: center; justify-content: space-between;
      background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px;
      padding: 8px 10px; font-size: 12px; gap: 8px;
    }
    .result-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .result-item a {
      font-size: 12px; color: #1a56a0; font-weight: bold; text-decoration: none;
      white-space: nowrap;
    }
    .result-item a:hover { text-decoration: underline; }
    .result-section-title {
      font-size: 11px; font-weight: bold; text-transform: uppercase;
      color: #888; letter-spacing: .5px; margin-top: 8px; margin-bottom: 4px;
      padding-top: 8px; border-top: 1px solid #e5e7eb;
    }
    .result-section-title:first-child { margin-top: 0; padding-top: 0; border-top: none; }
    .no-results { font-size: 12px; color: #aaa; font-style: italic; }

    /* Спиннер */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #bfdbfe; border-top-color: #1a56a0;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
  </style>
</head>
<body>
<header>
  <span class="title">Отчёты СК</span>
</header>

<div class="layout">

  <!-- Левая панель -->
  <div class="sidebar">

    <div>
      <div class="section-title">Отчёты от инженеров</div>
      <div class="upload-zone" onclick="document.getElementById('inp-reports').click()">
        <input type="file" id="inp-reports" multiple accept=".docx,.doc" onchange="uploadReports(this)"/>
        <span>Перетащите или нажмите<br>для загрузки .docx/.doc</span>
      </div>
      <div class="file-count" id="fileCount" style="margin-top:4px">Нет файлов</div>
      <div class="file-list" id="list-reports" style="margin-top:4px"><div style="color:#aaa;font-style:italic">—</div></div>
    </div>

    <hr class="divider"/>

    <div>
      <div class="section-title">Проверка и исправление</div>
      <button class="btn btn-blue" id="btnCheck" onclick="startCheck()">Проверить и исправить</button>
      <button class="btn btn-gray" style="margin-top:6px" onclick="downloadAllFixed()">Скачать все (ZIP)</button>
    </div>

    <hr class="divider"/>

    <div>
      <div class="section-title">Руководитель отчёта</div>
      <button class="btn btn-blue" style="margin-bottom:6px" onclick="switchLeader('aniskov')">Аниськов В.И.</button>
      <button class="btn btn-orange" onclick="switchLeader('mandzhiev')">Манджиев И.А. (И.О.)</button>
    </div>

    <hr class="divider"/>

    <div>
      <div class="section-title">Макросы (до сборки)</div>
      <button class="btn btn-blue" style="margin-bottom:6px"
              onclick="runMacro('HighlightSecondRow_No5991')">Выделить 2-ю строку таблиц</button>
      <button class="btn btn-blue" style="margin-bottom:6px"
              onclick="runMacro('NewMacros')">Форматировать документ</button>
      <div class="btn-row" style="margin-bottom:6px">
        <button class="btn btn-orange" onclick="runMacro('ReplaceDateInReportLine')">Дата → сегодня</button>
        <button class="btn btn-orange" onclick="runMacro('ReplaceDateInReportLine2')">Дата → вчера</button>
      </div>
      <button class="btn btn-blue"
              onclick="runMacro('ApplyTemplateLayout')">Применить размеры шаблона</button>
    </div>

    <hr class="divider"/>

    <div>
      <div class="section-title">Переименовать шаблоны</div>
      <div class="btn-row">
        <button class="btn btn-orange" onclick="renameFiles('today')">→ сегодня</button>
        <button class="btn btn-orange" onclick="renameFiles('yesterday')">→ вчера</button>
      </div>
    </div>

    <hr class="divider"/>

    <button class="btn btn-green" onclick="mergeAll()">Сформировать все отчёты</button>

    <div id="rename-results-buttons" style="display:none">
      <div class="section-title" style="margin-top:4px">Переименовать результаты</div>
      <div class="btn-row">
        <button class="btn btn-orange" onclick="renameResults('today')">→ сегодня</button>
        <button class="btn btn-orange" onclick="renameResults('yesterday')">→ вчера</button>
      </div>
    </div>

    <hr class="divider"/>

    <button class="btn btn-gray" onclick="downloadAll()">Забрать всё (ZIP)</button>

    <hr class="divider"/>

    <div class="btn-row">
      <button class="btn btn-gray" onclick="clearReports()">Очистить отчёты</button>
      <button class="btn btn-red" onclick="resetAll()">Сбросить всё</button>
    </div>

  </div>

  <!-- Центральная область — активность -->
  <div class="main">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="activity-panel" id="activityPanel">
      <div class="live-status hidden" id="liveStatus">
        <span class="spinner" id="liveSpinner"></span>
        <span class="live-status-text" id="liveStatusText"></span>
      </div>
      <div class="empty-hint" id="emptyHint">
        <span class="empty-hint-icon">📂</span>
        <span>Загрузите отчёты и выберите операцию</span>
      </div>
    </div>
  </div>

  <!-- Правая панель — результаты -->
  <div class="results-panel">
    <div class="result-section-title">Исправленные файлы</div>
    <div id="fixedFiles"><div class="no-results">Пока нет</div></div>

    <div class="result-section-title">Готовые отчёты</div>
    <div id="results-list"><div class="no-results">Пока нет</div></div>
  </div>

</div>

<script>
  // ── Утилиты ──────────────────────────────────────────────────────────────

  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ── Activity panel API ────────────────────────────────────────────────────

  const MAX_OP_CARDS = 20;

  function _trimHistory() {
    const panel = document.getElementById('activityPanel');
    const cards = panel.querySelectorAll('.op-card');
    if (cards.length > MAX_OP_CARDS) {
      for (let i = 0; i < cards.length - MAX_OP_CARDS; i++) cards[i].remove();
    }
  }

  function createOpCard(title) {
    const panel = document.getElementById('activityPanel');
    document.getElementById('emptyHint').style.display = 'none';
    const statusId = 'ls_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const card = document.createElement('div');
    card.className = 'op-card summary-card';
    card.innerHTML = `
      <div class="summary-card-header">
        <span class="summary-card-title">${escHtml(title)}</span>
        <span class="summary-card-meta">${new Date().toLocaleTimeString('ru')}</span>
      </div>
      <div class="live-status op-live" id="${statusId}">
        <span class="spinner"></span>
        <span class="live-status-text"></span>
      </div>
      <div class="op-body" style="display:none"></div>
    `;
    panel.insertBefore(card, document.getElementById('emptyHint'));
    panel.scrollTop = panel.scrollHeight;
    _trimHistory();
    return { card, statusId };
  }

  function setCardStatus(statusId, msg, state) {
    const el = document.getElementById(statusId);
    if (!el) return;
    el.classList.remove('done', 'error');
    const spinner = el.querySelector('.spinner');
    const txt = el.querySelector('.live-status-text');
    if (state === 'done') {
      el.classList.add('done');
      if (spinner) spinner.style.display = 'none';
    } else if (state === 'error') {
      el.classList.add('error');
      if (spinner) spinner.style.display = 'none';
    } else {
      if (spinner) spinner.style.display = '';
    }
    txt.textContent = msg;
  }

  function finalizeOpCard(card, statusId, stats, details, fileCards) {
    const liveEl = document.getElementById(statusId);
    if (liveEl) liveEl.remove();

    const statsContainer = document.createElement('div');
    statsContainer.className = 'summary-stats';
    statsContainer.innerHTML = stats.map(s =>
      `<span class="stat-chip stat-${s.color}">${escHtml(s.label)}</span>`
    ).join('');
    card.appendChild(statsContainer);

    const hasDetails = (details && details.length) || (fileCards && fileCards.length);
    if (hasDetails) {
      const detailId = 'det_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'detail-toggle';
      toggleBtn.textContent = 'Подробности ▼';
      toggleBtn.onclick = () => {
        const block = document.getElementById(detailId);
        block.classList.toggle('open');
        toggleBtn.textContent = block.classList.contains('open') ? 'Подробности ▲' : 'Подробности ▼';
      };
      card.appendChild(toggleBtn);

      const detailBlock = document.createElement('div');
      detailBlock.className = 'detail-block';
      detailBlock.id = detailId;

      if (details && details.length) {
        details.forEach(d => {
          const row = document.createElement('div');
          row.className = 'detail-row';
          row.innerHTML = `
            <span class="detail-icon">${d.icon || ''}</span>
            <span class="detail-name" title="${escHtml(d.name)}">${escHtml(d.name)}</span>
            ${d.badge ? `<span class="detail-badge ${d.badgeClass || ''}">${escHtml(d.badge)}</span>` : ''}
          `;
          detailBlock.appendChild(row);
        });
      }

      if (fileCards && fileCards.length) {
        fileCards.forEach(fc => detailBlock.appendChild(fc));
      }

      card.appendChild(detailBlock);
    }
  }

  function buildFileCardEl(filename, hasErrors, reportText, downloadUrl) {
    const bodyId = 'rb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const badgeHtml = hasErrors
      ? '<span class="badge badge-err">⚠ Проблемы</span>'
      : '<span class="badge badge-ok">✓ ОК</span>';
    const bodyHtml = reportText
      ? `<div class="report-body" id="${bodyId}">${escHtml(reportText)}</div>`
      : '';
    const toggleHtml = reportText
      ? `<button class="detail-toggle" onclick="toggleReportBody('${bodyId}', this)" style="margin-top:6px">Показать отчёт ▼</button>`
      : '';
    const dlHtml = downloadUrl
      ? `<a href="${downloadUrl}" download>Скачать исправленный</a>`
      : '';
    const el = document.createElement('div');
    el.className = 'file-card';
    el.style.marginTop = '6px';
    el.dataset.filename = filename;
    el.innerHTML = `
      <div class="file-card-head">
        <span class="file-card-name" title="${escHtml(filename)}">${escHtml(filename)}</span>
        ${badgeHtml}
      </div>
      ${toggleHtml}
      ${bodyHtml}
      ${dlHtml ? `<div class="file-card-actions">${dlHtml}</div>` : ''}
    `;
    return el;
  }

  function toggleDetail(id) {
    const el = document.getElementById(id);
    const btn = el.previousElementSibling;
    el.classList.toggle('open');
    btn.textContent = el.classList.contains('open') ? 'Подробности ▲' : 'Подробности ▼';
  }

  function toggleReportBody(id, btn) {
    const el = document.getElementById(id);
    const open = el.style.display === 'block';
    el.style.display = open ? 'none' : 'block';
    btn.textContent = open ? 'Показать отчёт ▼' : 'Скрыть отчёт ▲';
  }

  async function apiFetch(url, options = {}, statusId) {
    try {
      const res = await fetch(url, options);
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || res.statusText);
      return data;
    } catch (e) {
      if (statusId) setCardStatus(statusId, 'Ошибка: ' + e.message, 'error');
      throw e;
    }
  }

  // ── Файлы ─────────────────────────────────────────────────────────────────

  let fixedFiles = [];

  function addFixed(filename, downloadUrl) {
    if (fixedFiles.includes(downloadUrl)) return;
    fixedFiles.push(downloadUrl);
    const container = document.getElementById('fixedFiles');
    const noRes = container.querySelector('.no-results');
    if (noRes) noRes.remove();
    const item = document.createElement('div');
    item.className = 'result-item';
    item.innerHTML = `<span title="${escHtml(filename)}">${escHtml(filename)}</span><a href="${downloadUrl}" download>Скачать</a>`;
    container.appendChild(item);
  }

  async function refreshReportsList() {
    const data = await apiFetch('/files/reports');
    const files = data.files || [];
    const el = document.getElementById('list-reports');
    const count = document.getElementById('fileCount');
    el.innerHTML = files.length
      ? files.map(f => `<div>${escHtml(f)}</div>`).join('')
      : '<div style="color:#aaa;font-style:italic">—</div>';
    count.textContent = files.length ? `Загружено файлов: ${files.length}` : 'Нет файлов';
  }

  async function refreshResults() {
    const data = await apiFetch('/results');
    const el = document.getElementById('results-list');
    el.innerHTML = data.files && data.files.length
      ? data.files.map(f =>
          `<div class="result-item">
             <span title="${escHtml(f)}">${escHtml(f)}</span>
             <a href="/download/${encodeURIComponent(f)}" download>Скачать</a>
           </div>`
        ).join('')
      : '<div class="no-results">Пока нет</div>';
  }

  // ── Загрузка отчётов ──────────────────────────────────────────────────────

  async function uploadReports(input) {
    const fd = new FormData();
    for (const f of input.files) fd.append('files', f);
    const { card, statusId } = createOpCard('Загрузка файлов');
    setCardStatus(statusId, `Загружаю ${input.files.length} файл(ов)...`);
    try {
      const data = await apiFetch('/upload/reports', { method: 'POST', body: fd }, statusId);
      finalizeOpCard(card, statusId, [{ label: `Загружено: ${data.count}`, color: 'green' }], null, null);
      refreshReportsList();
    } catch (_) {}
  }

  async function clearReports() {
    const { card, statusId } = createOpCard('Очистка отчётов');
    setCardStatus(statusId, 'Удаляю загруженные отчёты...');
    try {
      await apiFetch('/clear/reports', { method: 'DELETE' }, statusId);
      finalizeOpCard(card, statusId, [{ label: 'Удалено', color: 'blue' }], null, null);
      refreshReportsList();
    } catch (_) {}
  }

  // ── Проверка и исправление (SSE) ──────────────────────────────────────────

  async function startCheck() {
    const btn = document.getElementById('btnCheck');
    btn.disabled = true;
    btn.textContent = 'Проверяю...';
    document.getElementById('fixedFiles').innerHTML = '<div class="no-results">Пока нет</div>';
    fixedFiles = [];

    const bar = document.getElementById('progressBar');
    bar.style.width = '10%';

    const { card, statusId } = createOpCard('Проверка отчётов');
    setCardStatus(statusId, 'Запускаю проверку...');

    const resp = await fetch('/check/descriptions/stream', { method: 'POST' });
    if (!resp.ok) {
      setCardStatus(statusId, 'Ошибка запуска проверки', 'error');
      finalizeOpCard(card, statusId, [{ label: 'Ошибка', color: 'red' }], null, null);
      btn.disabled = false;
      btn.textContent = 'Проверить и исправить';
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let processed = 0;
    const collectedFileCards = [];
    const downloadMap = {};

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let ev;
        try { ev = JSON.parse(line.slice(6)); } catch { continue; }

        if (ev.type === 'start') {
          setCardStatus(statusId, ev.msg);
          bar.style.width = '20%';
        } else if (ev.type === 'info') {
          setCardStatus(statusId, ev.msg);
        } else if (ev.type === 'report') {
          processed++;
          bar.style.width = Math.min(20 + processed * 30, 85) + '%';
          collectedFileCards.push({ filename: ev.filename, hasErrors: ev.hasErrors, reportText: ev.result?.report || '', downloadUrl: null });
        } else if (ev.type === 'fixed') {
          addFixed(ev.filename, ev.download);
          downloadMap[ev.filename] = ev.download;
        } else if (ev.type === 'done') {
          bar.style.width = '100%';
          const s = ev.summary || {};
          const total = s.total || 0;
          const errors = s.errors || 0;
          const fileCardEls = collectedFileCards.map(fc =>
            buildFileCardEl(fc.filename, fc.hasErrors, fc.reportText, downloadMap[fc.filename] || null)
          );
          finalizeOpCard(card, statusId, [
            { label: `Всего: ${total}`, color: 'blue' },
            { label: `ОК: ${total - errors}`, color: 'green' },
            ...(errors > 0 ? [{ label: `Проблем: ${errors}`, color: 'red' }] : []),
          ], null, fileCardEls);
          setTimeout(() => { bar.style.width = '0%'; }, 2000);
          btn.disabled = false;
          btn.textContent = 'Проверить и исправить';
        } else if (ev.type === 'error') {
          setCardStatus(statusId, ev.msg, 'error');
        }
      }
    }
    btn.disabled = false;
    btn.textContent = 'Проверить и исправить';
  }

  // ── Руководитель ──────────────────────────────────────────────────────────

  async function switchLeader(leader) {
    const names = {
      'aniskov': 'Аниськов Владимир Иванович',
      'mandzhiev': 'Манджиев Игорь Александрович (И.О.)'
    };
    const { card, statusId } = createOpCard(`Руководитель: ${names[leader]}`);
    setCardStatus(statusId, `Переключаю руководителя на: ${names[leader]}...`);
    try {
      const data = await apiFetch(`/switch-leader-ai/${leader}`, { method: 'POST' }, statusId);
      if (data.ok) {
        const lines = data.message.split('\n').filter(l => l.trim());
        const details = lines.map(l => ({
          icon: l.startsWith('→') ? '✓' : '',
          name: l.replace(/^→\s*/, ''),
          badge: l.includes('замен') ? 'изменено' : null,
          badgeClass: 'db-ok',
        }));
        finalizeOpCard(card, statusId, [
          { label: `Файлов: ${lines.filter(l => l.startsWith('→')).length}`, color: 'green' },
        ], details, null);
      } else {
        setCardStatus(statusId, `Ошибка: ${data.message || 'Неизвестная ошибка'}`, 'error');
        finalizeOpCard(card, statusId, [{ label: 'Ошибка', color: 'red' }], null, null);
      }
    } catch (_) {}
  }

  // ── Макросы ───────────────────────────────────────────────────────────────

  async function runMacro(name) {
    const names = {
      'HighlightSecondRow_No5991': 'Выделение 2-й строки таблиц',
      'NewMacros': 'Форматирование документа',
      'ReplaceDateInReportLine': 'Замена даты на сегодняшнюю',
      'ReplaceDateInReportLine2': 'Замена даты на вчерашнюю',
      'ApplyTemplateLayout': 'Применить размеры шаблона',
    };
    const { card, statusId } = createOpCard(names[name] || name);
    setCardStatus(statusId, `Запускаю: ${names[name] || name}...`);
    try {
      const data = await apiFetch(`/macro/${name}`, { method: 'POST' }, statusId);
      const details = data.log.map(line => ({
        icon: line.startsWith('[ERR]') ? '✗' : '✓',
        name: line.replace(/^\[(OK|ERR)\]\s*/, ''),
        badge: line.startsWith('[ERR]') ? 'Ошибка' : 'OK',
        badgeClass: line.startsWith('[ERR]') ? 'db-err' : 'db-ok',
      }));
      const errCount = data.log.filter(l => l.startsWith('[ERR]')).length;
      const okCount = data.log.length - errCount;
      finalizeOpCard(card, statusId, [
        ...(okCount > 0 ? [{ label: `OK: ${okCount}`, color: 'green' }] : []),
        ...(errCount > 0 ? [{ label: `Ошибок: ${errCount}`, color: 'red' }] : []),
      ], details, null);
    } catch (_) {}
  }

  // ── Переименование ────────────────────────────────────────────────────────

  async function renameFiles(mode) {
    const label = mode === 'today' ? 'сегодня' : 'вчера';
    const { card, statusId } = createOpCard(`Шаблоны → ${label}`);
    setCardStatus(statusId, `Обновление даты в шаблонах (→ ${label})...`);
    try {
      const data = await apiFetch(`/rename/templates/${mode}`, { method: 'POST' }, statusId);
      const details = data.log.map(line => ({
        icon: line.startsWith('Ошибка') ? '✗' : '✓',
        name: line,
        badge: line.startsWith('Ошибка') ? 'Ошибка' : 'OK',
        badgeClass: line.startsWith('Ошибка') ? 'db-err' : 'db-ok',
      }));
      finalizeOpCard(card, statusId, [
        { label: `Файлов: ${data.log.length || 0}`, color: data.log.length ? 'green' : 'amber' },
      ], details.length ? details : null, null);
    } catch (_) {}
  }

  async function renameResults(mode) {
    const label = mode === 'today' ? 'сегодня' : 'вчера';
    const { card, statusId } = createOpCard(`Результаты → ${label}`);
    setCardStatus(statusId, `Переименование результатов (→ ${label})...`);
    try {
      const data = await apiFetch(`/rename/results/${mode}`, { method: 'POST' }, statusId);
      const details = data.log.map(line => ({
        icon: line.startsWith('Ошибка') ? '✗' : '✓',
        name: line,
        badge: line.startsWith('Ошибка') ? 'Ошибка' : 'OK',
        badgeClass: line.startsWith('Ошибка') ? 'db-err' : 'db-ok',
      }));
      finalizeOpCard(card, statusId, [
        { label: `Файлов: ${data.log.length || 0}`, color: data.log.length ? 'green' : 'amber' },
      ], details.length ? details : null, null);
      refreshResults();
    } catch (_) {}
  }

  // ── Сборка всех отчётов (SSE) ─────────────────────────────────────────────

  async function mergeAll() {
    const { card, statusId } = createOpCard('Сборка отчётов');
    setCardStatus(statusId, 'Формирую все отчёты...');
    const bar = document.getElementById('progressBar');
    bar.style.width = '10%';

    try {
      const response = await fetch('/merge/all/stream');
      if (!response.ok) throw new Error(response.statusText);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let successCount = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const ev = JSON.parse(line.slice(6));
            if (ev.type === 'start') {
              bar.style.width = '20%';
            } else if (ev.type === 'info') {
              if (!ev.msg.includes('Найдено 0 отчётов')) {
                setCardStatus(statusId, ev.msg);
              }
            } else if (ev.type === 'success') {
              successCount++;
              setCardStatus(statusId, ev.msg);
              bar.style.width = Math.min(20 + successCount * 10, 85) + '%';
            } else if (ev.type === 'warning') {
              setCardStatus(statusId, ev.msg);
            } else if (ev.type === 'error') {
              setCardStatus(statusId, ev.msg, 'error');
            } else if (ev.type === 'done') {
              bar.style.width = '100%';
              const merged = ev.results || [];
              const unmatched = ev.unmatched || [];
              const unknown = ev.unmatched_unknown || [];
              const errCount = (ev.errors || []).length;

              const details = [
                ...merged.map(r => ({ icon: '✓', name: `${r.company} (${r.inserted} отч.)`, badge: 'Собран', badgeClass: 'db-ok' })),
                ...unmatched.map(f => ({ icon: '⚠', name: `${f.file} — нет болванки`, badge: f.company, badgeClass: 'db-warn' })),
                ...unknown.map(f => ({ icon: '?', name: f, badge: 'Не распознан', badgeClass: 'db-err' })),
              ];

              finalizeOpCard(card, statusId, [
                { label: `Собрано: ${merged.length}`, color: 'green' },
                ...(unmatched.length > 0 ? [{ label: `Без болванки: ${unmatched.length}`, color: 'amber' }] : []),
                ...(unknown.length > 0 ? [{ label: `Не распознано: ${unknown.length}`, color: 'red' }] : []),
                ...(errCount > 0 ? [{ label: `Ошибок: ${errCount}`, color: 'red' }] : []),
              ], details.length ? details : null, null);

              setTimeout(() => { bar.style.width = '0%'; }, 2000);

              if (merged.length > 0) {
                document.getElementById('rename-results-buttons').style.display = 'block';
              }
            }
          } catch (e) {
            console.error('Parse error:', e);
          }
        }
      }
    } catch (e) {
      setCardStatus(statusId, `Ошибка: ${e.message}`, 'error');
      finalizeOpCard(card, statusId, [{ label: 'Ошибка', color: 'red' }], null, null);
    }

    refreshResults();
  }

  // ── Скачать всё ZIP ───────────────────────────────────────────────────────

  async function downloadAll() {
    const { card, statusId } = createOpCard('Скачать всё ZIP');
    setCardStatus(statusId, 'Подготавливаю архив...');
    const a = document.createElement('a');
    a.href = '/download/all.zip';
    a.download = 'отчёты.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    finalizeOpCard(card, statusId, [{ label: 'Загрузка началась', color: 'green' }], null, null);
  }

  async function downloadAllFixed() {
    const { card, statusId } = createOpCard('Скачать исправленные ZIP');
    setCardStatus(statusId, 'Подготавливаю архив...');
    const a = document.createElement('a');
    a.href = '/download/fixed/all.zip';
    a.download = 'исправленные.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    finalizeOpCard(card, statusId, [{ label: 'Загрузка началась', color: 'green' }], null, null);
  }

  // ── Сброс ─────────────────────────────────────────────────────────────────

  async function resetAll() {
    if (!confirm('Сбросить всё? Удалятся отчёты и результаты.')) return;
    const { card, statusId } = createOpCard('Сброс всех данных');
    setCardStatus(statusId, 'Удаляю все файлы...');
    try {
      await apiFetch('/clear/all', { method: 'DELETE' }, statusId);
      document.getElementById('fixedFiles').innerHTML = '<div class="no-results">Пока нет</div>';
      fixedFiles = [];
      finalizeOpCard(card, statusId, [{ label: 'Сброшено', color: 'blue' }], null, null);
      refreshReportsList();
      refreshResults();
    } catch (_) {}
  }

  // ── Drag & Drop ───────────────────────────────────────────────────────────

  const uploadZone = document.getElementById('inp-reports').closest('.upload-zone');
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.style.borderColor = '#1a56a0'; });
  uploadZone.addEventListener('dragleave', () => { uploadZone.style.borderColor = '#aac4e8'; });
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.style.borderColor = '#aac4e8';
    const input = document.getElementById('inp-reports');
    const dt = new DataTransfer();
    for (const f of e.dataTransfer.files) dt.items.add(f);
    input.files = dt.files;
    uploadReports(input);
  });

  // ── Инициализация ─────────────────────────────────────────────────────────

  refreshReportsList();
  refreshResults();
</script>
