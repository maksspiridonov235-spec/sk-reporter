<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Проверка и исправление отчётов СК</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; color: #222; }
    header {
      background: #1a56a0; color: #fff; padding: 16px 24px;
      display: flex; align-items: center; gap: 16px;
    }
    header a { color: #fff; text-decoration: none; font-size: 14px; opacity: .8; }
    header a:hover { opacity: 1; }
    header .title { font-size: 18px; font-weight: bold; }

    .layout { display: flex; gap: 0; height: calc(100vh - 54px); }

    /* Левая панель */
    .sidebar {
      width: 300px; min-width: 260px; background: #fff; border-right: 1px solid #ddd;
      display: flex; flex-direction: column; padding: 16px; gap: 12px; overflow-y: auto;
    }
    .section-title {
      font-size: 12px; font-weight: bold; text-transform: uppercase;
      color: #888; letter-spacing: .5px; margin-bottom: 4px;
    }
    .upload-zone {
      border: 2px dashed #aac4e8; border-radius: 8px; padding: 14px;
      text-align: center; cursor: pointer; background: #f5f9ff;
      transition: border-color .2s;
    }
    .upload-zone:hover { border-color: #1a56a0; }
    .upload-zone input { display: none; }
    .upload-zone span { font-size: 13px; color: #555; }

    .file-list {
      font-size: 12px; color: #444; max-height: 160px; overflow-y: auto;
      border: 1px solid #e0e0e0; border-radius: 6px; padding: 6px; background: #fafafa;
    }
    .file-list div { padding: 2px 0; border-bottom: 1px solid #f0f0f0; }
    .file-list div:last-child { border-bottom: none; }
    .file-count { font-size: 12px; color: #888; }

    .btn {
      width: 100%; padding: 9px 12px; border: none; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-weight: bold; transition: background .15s;
    }
    .btn-blue   { background: #1a56a0; color: #fff; }
    .btn-blue:hover   { background: #154480; }
    .btn-green  { background: #1e8c45; color: #fff; }
    .btn-green:hover  { background: #166835; }
    .btn-red    { background: #dc2626; color: #fff; }
    .btn-red:hover    { background: #b91c1c; }
    .btn-gray   { background: #6b7280; color: #fff; }
    .btn-gray:hover   { background: #4b5563; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .divider { border: none; border-top: 1px solid #e5e7eb; margin: 4px 0; }

    /* Центральная область */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Лог */
    .log-panel {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .log-header {
      font-size: 13px; font-weight: bold; color: #444; padding-bottom: 8px;
      border-bottom: 1px solid #e5e7eb; margin-bottom: 4px;
    }

    .log-item {
      border-radius: 6px; padding: 10px 14px; font-size: 13px;
      border: 1px solid transparent;
    }
    .log-start    { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }
    .log-info     { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
    .log-warning  { background: #fffbeb; border-color: #fde68a; color: #92400e; }
    .log-error    { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
    .log-report   { background: #fff; border-color: #e5e7eb; }
    .log-fixed    { background: #f0fdf4; border-color: #86efac; }
    .log-done     { background: #f8fafc; border-color: #cbd5e1; color: #475569; font-weight: bold; }

    .log-report-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px;
    }
    .log-report-head .filename { font-weight: bold; font-size: 13px; }
    .badge {
      font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 12px;
    }
    .badge-ok  { background: #d1fae5; color: #065f46; }
    .badge-err { background: #fee2e2; color: #991b1b; }

    .report-body {
      display: none; font-size: 12px; color: #444;
      background: #f9fafb; border-radius: 4px; padding: 8px;
      white-space: pre-wrap; font-family: monospace; margin-top: 8px;
      max-height: 300px; overflow-y: auto;
      border: 1px solid #e5e7eb;
    }
    .report-toggle {
      font-size: 12px; color: #1a56a0; cursor: pointer; text-decoration: underline;
      margin-top: 4px; display: inline-block;
    }

    .fixed-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .fixed-row a {
      font-size: 13px; font-weight: bold; color: #1a56a0; text-decoration: none;
      padding: 4px 12px; border: 1px solid #1a56a0; border-radius: 4px;
    }
    .fixed-row a:hover { background: #1a56a0; color: #fff; }

    /* Правая панель — исправленные файлы */
    .results-panel {
      width: 280px; min-width: 220px; background: #fff; border-left: 1px solid #ddd;
      display: flex; flex-direction: column; padding: 16px; gap: 8px; overflow-y: auto;
    }
    .results-title { font-size: 12px; font-weight: bold; text-transform: uppercase; color: #888; letter-spacing: .5px; }
    .result-item {
      display: flex; align-items: center; justify-content: space-between;
      background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px;
      padding: 8px 10px; font-size: 12px; gap: 8px;
    }
    .result-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .result-item a {
      font-size: 12px; color: #1a56a0; font-weight: bold; text-decoration: none;
      white-space: nowrap;
    }
    .result-item a:hover { text-decoration: underline; }
    .no-results { font-size: 12px; color: #aaa; font-style: italic; }

    /* Прогресс */
    .progress-bar-wrap {
      height: 4px; background: #e5e7eb; overflow: hidden;
    }
    .progress-bar {
      height: 4px; background: #1a56a0; width: 0%; transition: width .3s;
    }

    /* Спиннер */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #bfdbfe; border-top-color: #1a56a0;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
  </style>
</head>
<body>
<header>
  <a href="/">← Назад</a>
  <span class="title">Проверка и исправление отчётов</span>
</header>

<div class="layout">
  <!-- Левая панель -->
  <div class="sidebar">
    <div class="section-title">Загрузить отчёты</div>
    <div class="upload-zone" onclick="document.getElementById('reportFiles').click()">
      <input type="file" id="reportFiles" multiple accept=".docx,.doc" onchange="uploadReports(this.files)"/>
      <span>Нажмите или перетащите<br>.docx файлы сюда</span>
    </div>
    <div class="file-count" id="fileCount">Нет загруженных файлов</div>
    <div class="file-list" id="fileList"><div style="color:#aaa;font-style:italic">—</div></div>

    <hr class="divider"/>

    <button class="btn btn-blue" id="btnCheck" onclick="startCheck()">
      Проверить и исправить
    </button>

    <hr class="divider"/>

    <button class="btn btn-gray" onclick="clearReports()">Очистить загруженные</button>
    <button class="btn btn-red" onclick="clearLog()">Очистить лог</button>
  </div>

  <!-- Центральная область -->
  <div class="main">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="log-panel" id="logPanel">
      <div class="log-header">Лог проверки</div>
      <div class="log-item log-info" style="color:#aaa;font-style:italic">Загрузите отчёты и нажмите «Проверить и исправить»</div>
    </div>
  </div>

  <!-- Правая панель -->
  <div class="results-panel">
    <div class="results-title">Исправленные файлы</div>
    <div id="fixedFiles"><div class="no-results">Пока нет</div></div>
  </div>
</div>

<script>
  async function loadFiles() {
    const res = await fetch('/files/reports');
    const data = await res.json();
    const files = data.files || [];
    const list = document.getElementById('fileList');
    const count = document.getElementById('fileCount');
    list.innerHTML = files.length
      ? files.map(f => `<div>${f}</div>`).join('')
      : '<div style="color:#aaa;font-style:italic">—</div>';
    count.textContent = files.length ? `Загружено файлов: ${files.length}` : 'Нет загруженных файлов';
  }

  async function uploadReports(files) {
    if (!files.length) return;
    const fd = new FormData();
    for (const f of files) fd.append('files', f);
    addLog('info', `Загружаю ${files.length} файл(ов)...`);
    const res = await fetch('/upload/reports', { method: 'POST', body: fd });
    const data = await res.json();
    addLog('info', `Загружено: ${data.count} файл(ов)`);
    loadFiles();
  }

  async function clearReports() {
    await fetch('/clear/reports', { method: 'DELETE' });
    addLog('info', 'Загруженные отчёты удалены');
    loadFiles();
  }

  function clearLog() {
    const panel = document.getElementById('logPanel');
    panel.innerHTML = '<div class="log-header">Лог проверки</div>';
  }

  let fixedFiles = [];

  function addFixed(filename, downloadUrl) {
    if (fixedFiles.includes(downloadUrl)) return;
    fixedFiles.push(downloadUrl);
    const container = document.getElementById('fixedFiles');
    const noRes = container.querySelector('.no-results');
    if (noRes) noRes.remove();
    const item = document.createElement('div');
    item.className = 'result-item';
    item.innerHTML = `<span title="${filename}">${filename}</span><a href="${downloadUrl}" download>Скачать</a>`;
    container.appendChild(item);
  }

  function addLog(type, msg, extra) {
    const panel = document.getElementById('logPanel');
    const item = document.createElement('div');
    item.className = `log-item log-${type}`;
    if (type === 'start') {
      item.innerHTML = `<span class="spinner"></span>${msg}`;
    } else if (type === 'report' && extra) {
      const badge = extra.hasErrors
        ? '<span class="badge badge-err">⚠ Найдены проблемы</span>'
        : '<span class="badge badge-ok">✓ ОК</span>';
      const reportText = extra.result?.report || '';
      const toggleId = 'toggle_' + Date.now();
      const bodyId  = 'body_' + Date.now();
      item.innerHTML = `
        <div class="log-report-head">
          <span class="filename">${extra.filename || msg}</span>
          ${badge}
        </div>
        ${reportText ? `<span class="report-toggle" id="${toggleId}" onclick="toggleReport('${toggleId}','${bodyId}')">Показать отчёт ▼</span>
        <div class="report-body" id="${bodyId}">${escHtml(reportText)}</div>` : ''}
      `;
    } else if (type === 'fixed' && extra) {
      item.className = 'log-item log-fixed';
      item.innerHTML = `<div class="fixed-row">
        <span>✅ ${extra.filename} → исправлен</span>
        <a href="${extra.download}" download>Скачать</a>
      </div>`;
      addFixed(extra.filename, extra.download);
    } else {
      item.textContent = msg;
    }
    panel.appendChild(item);
    panel.scrollTop = panel.scrollHeight;
    return item;
  }

  function toggleReport(toggleId, bodyId) {
    const body = document.getElementById(bodyId);
    const toggle = document.getElementById(toggleId);
    if (body.style.display === 'block') {
      body.style.display = 'none';
      toggle.textContent = 'Показать отчёт ▼';
    } else {
      body.style.display = 'block';
      toggle.textContent = 'Скрыть отчёт ▲';
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function startCheck() {
    const btn = document.getElementById('btnCheck');
    btn.disabled = true;
    btn.textContent = 'Проверяю...';
    clearLog();
    document.getElementById('fixedFiles').innerHTML = '<div class="no-results">Пока нет</div>';
    fixedFiles = [];

    const bar = document.getElementById('progressBar');
    bar.style.width = '10%';

    const es = new EventSource('/check/descriptions/stream', { method: undefined });
    // SSE через POST не работает нативно — используем fetch + ReadableStream
    es.close();

    const resp = await fetch('/check/descriptions/stream', { method: 'POST' });
    if (!resp.ok) {
      addLog('error', 'Ошибка запуска проверки');
      btn.disabled = false;
      btn.textContent = 'Проверить и исправить';
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let processed = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let ev;
        try { ev = JSON.parse(line.slice(6)); } catch { continue; }

        if (ev.type === 'start') {
          addLog('start', ev.msg);
          bar.style.width = '20%';
        } else if (ev.type === 'info') {
          addLog('info', ev.msg);
        } else if (ev.type === 'warning') {
          addLog('warning', ev.msg);
        } else if (ev.type === 'error') {
          addLog('error', ev.msg);
        } else if (ev.type === 'report') {
          processed++;
          addLog('report', ev.msg, { filename: ev.filename, hasErrors: ev.hasErrors, result: ev.result });
          bar.style.width = Math.min(20 + processed * 30, 85) + '%';
        } else if (ev.type === 'fixed') {
          addLog('fixed', ev.msg, { filename: ev.filename, download: ev.download });
        } else if (ev.type === 'done') {
          bar.style.width = '100%';
          const s = ev.summary || {};
          addLog('done', `Готово. Всего: ${s.total || 0}, с проблемами: ${s.errors || 0}`);
          setTimeout(() => { bar.style.width = '0%'; }, 2000);
          btn.disabled = false;
          btn.textContent = 'Проверить и исправить';
        }
      }
    }
    btn.disabled = false;
    btn.textContent = 'Проверить и исправить';
  }

  loadFiles();
</script>
</body>
</html>
