<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ section_title }} — Планирование — SK-Reporter</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="/static/app.css?v={{ git_head }}"/>
</head>
<body data-planning-section="{{ section }}">
{% include "_header.html" %}

<div class="planning-shell">
  {% if section == "personnel" %}
  <p class="planning-hint">Справочник сотрудников — <strong>PostgreSQL</strong> (RelaxDev). Обновление списка: загрузка Excel на этой странице.</p>
  <div id="personnelList"></div>
  {% elif section == "otkk" %}
  <p class="planning-hint">Карты ОТКК — только в <strong>PostgreSQL</strong>. Эталоны заливаются при старте сервера из репозитория.</p>
  <div id="otkkList"></div>
  {% endif %}
</div>
<script src="/static/planning.js?v={{ git_head }}"></script>
</body>
</html>
